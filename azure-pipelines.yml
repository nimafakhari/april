trigger:
  - v3
  - azure

pool:
  vmImage: 'ubuntu-latest'

variables:
  DOCKER_USERNAME: 'nimadocker3608'
  IMAGE_NAME: 'new-app'
  IMAGE_TAG: '$(Build.BuildId)'

stages:
- stage: BuildAndPushDocker
  displayName: Build and Push Docker Image
  jobs:
  - job: BuildAndPush
    displayName: Build and Push to Docker Hub
    steps:
    - checkout: self
    
    - task: Docker@2
      displayName: Build Docker Image
      inputs:
        command: build
        Dockerfile: '$(Build.SourcesDirectory)/Dockerfile'
        repository: '$(DOCKER_USERNAME)/$(IMAGE_NAME)'
        tags: |
          $(IMAGE_TAG)
          latest
    
    - script: |
        docker images
      displayName: Verify Image Built
    
    - task: Docker@2
      displayName: Push to Docker Hub
      inputs:
        command: push
        repository: '$(DOCKER_USERNAME)/$(IMAGE_NAME)'
        tags: |
          $(IMAGE_TAG)
          latest
        containerRegistry: DockerHubConnection

- stage: DeployKubernetes
  displayName: Deploy to Kubernetes
  dependsOn: BuildAndPushDocker
  jobs:
  - job: DeployJob
    displayName: Deploy to Minikube
    steps:
    - checkout: self
    
    - script: |
        kubectl apply -f $(Build.SourcesDirectory)/k8s/app-deployment.yml --validate=false
      displayName: Deploy App
    
    - script: |
        kubectl apply -f $(Build.SourcesDirectory)/k8s/redis-deployment.yml --validate=false
      displayName: Deploy Redis
    
    - script: |
        kubectl get pods -n default || echo "Kubectl not connected to cluster"
      displayName: Verify Deployment
