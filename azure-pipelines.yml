trigger:
  - v3
  - azure

pool:
  vmImage: 'ubuntu-latest'

variables:
  DOCKER_USERNAME: 'nimadocker3608'
  IMAGE_NAME: 'new-app'
  IMAGE_TAG: '$(Build.BuildId)'

stages:
- stage: BuildAndPushDocker
  displayName: Build and Push Docker Image
  jobs:
  - job: BuildAndPush
    displayName: Build and Push to Docker Hub
    steps:
    - checkout: self
    
    - task: Docker@2
      displayName: Build Docker Image
      inputs:
        command: build
        Dockerfile: '$(Build.SourcesDirectory)/Dockerfile'
        repository: '$(DOCKER_USERNAME)/$(IMAGE_NAME)'
        tags: |
          $(IMAGE_TAG)
          latest
    
    - script: |
        docker images
      displayName: Verify Image Built
    
    - task: Docker@2
      displayName: Push to Docker Hub
      inputs:
        command: push
        repository: '$(DOCKER_USERNAME)/$(IMAGE_NAME)'
        tags: |
          $(IMAGE_TAG)
          latest
        containerRegistry: DockerHubConnection

- stage: DeployKubernetes
  displayName: Deploy to Kubernetes
  dependsOn: BuildAndPushDocker
  jobs:
  - job: DeployJob
    displayName: Deploy to Minikube
    steps:
    - checkout: self
    
    - script: |
        python3 -c "
        import yaml
        import sys
        try:
            with open('$(Build.SourcesDirectory)/k8s/app-deployment.yml', 'r') as f:
                yaml.safe_load_all(f)
            print('✓ app-deployment.yml is valid YAML')
        except Exception as e:
            print(f'✗ Error: {e}', file=sys.stderr)
            sys.exit(1)
        "
      displayName: Validate App Manifest
    
    - script: |
        python3 -c "
        import yaml
        import sys
        try:
            with open('$(Build.SourcesDirectory)/k8s/redis-deployment.yml', 'r') as f:
                yaml.safe_load_all(f)
            print('✓ redis-deployment.yml is valid YAML')
        except Exception as e:
            print(f'✗ Error: {e}', file=sys.stderr)
            sys.exit(1)
        "
      displayName: Validate Redis Manifest
    
    - script: |
        echo "Manifests validated successfully. Ready for deployment to actual Kubernetes cluster."
        echo ""
        echo "=== App Deployment Manifest ==="
        cat $(Build.SourcesDirectory)/k8s/app-deployment.yml
        echo ""
        echo "=== Redis Deployment Manifest ==="
        cat $(Build.SourcesDirectory)/k8s/redis-deployment.yml
      displayName: Deployment Ready
